<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - Stiker WA</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css"> <!-- CSS Khusus Profil -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="container">
        <!-- Sidebar Kiri (Sama seperti index.html) -->
        <aside class="sidebar-left">
            <div class="logo">
                <i class="fab fa-twitter fa-2x"></i>
            </div>
            <nav>
                <a href="/index.html" class="nav-item"><i class="fas fa-home"></i> <span>Beranda</span></a>
                <a class="nav-item disabled"><i class="fas fa-hashtag"></i> <span>Jelajah</span></a>
                <a class="nav-item disabled"><i class="fas fa-bookmark"></i> <span>Bookmark</span></a>
                <a href="/profile.html" class="nav-item active"><i class="fas fa-user"></i> <span>Profil</span></a>
            </nav>
            <button class="tweet-button" style="display: none;">Unggah Stiker</button>
            <div class="user-profile" style="display: none; margin-top: auto; padding-bottom: 16px;">
                <div class="user-info">
                    <span id="user-email" style="font-weight: bold;"></span>
                </div>
                <button id="logout-button" class="action-btn" style="margin-left: auto;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </aside>

        <!-- Konten Utama Profil -->
        <main class="main-feed">
            <header class="profile-header">
                <h2 id="profile-username">Nama Pengguna</h2>
                <!-- Statistik bisa ditambahkan di sini -->
            </header>

            <div class="profile-tabs">
                <button id="uploaded-tab" class="tab-button active" data-tab="uploaded">Diunggah</button>
                <button id="favorites-tab" class="tab-button" data-tab="favorites">Favorit</button>
            </div>

            <div class="sticker-container" id="profile-sticker-container">
                <!-- Stiker akan dimuat di sini oleh JavaScript -->
            </div>
        </main>

        <!-- Sidebar Kanan (Sama seperti index.html) -->
        <aside class="sidebar-right">
            <!-- Bisa diisi dengan konten relevan atau dibiarkan kosong -->
        </aside>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app-config.js"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/interactions.js"></script>
</body>
</html>
